<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Economy System Graphic</title>
	<link rel="icon" href = "../_shared/assets/img/vic-favicon.png" />
    <link rel="stylesheet" href="../_shared/css/brand/vic-gov.css">
    <link rel="stylesheet" href="../_shared/css/brand/epa-brand.css">
    <link rel="stylesheet" href="../_shared/css/data-vis/vis-page-layout.css">
    <link rel="stylesheet" href="../_shared/css/data-vis/data-vis.css">
    <link rel="stylesheet" href="../_shared/css/data-vis/waste-treemap.css">
    <link rel="stylesheet" href="../_shared/css/illustration/waste-industry.css">
    <link rel="stylesheet" href="./css/vis.css">
</head>


<body class="data-vis">
    <main class="content__wrapper">
 
        <header class="sidebar__upper">
            <div class = 'title-block'>
                <div class = 'subtitle'>The shape of the</div>
                <h2 id = 'vis-title'>Victorian Circular Economy</h2>
                <select id = 'year-select'> </select>
            </div>

            <div class = 'lead-block'>
            </div>
        </header>
    
        <section class = "vis__container">
            <div id = "vis__wrapper" class = "vis__wrapper">
                <svg id="data-vis" width = "100%">
                    <defs>
                        <linearGradient id="lime-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%"   stop-color="var(--epa-primary-lime-life)"  />
                            <stop offset="100%" stop-color="var(--epa-primary-cool-air)" />
                        </linearGradient>

                        <linearGradient id="blue-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%"   stop-color="var(--epa-primary-deep-ocean)"  />
                            <stop offset="100%" stop-color="var(--epa-primary-cool-air)" />
                        </linearGradient>

                        <radialGradient id="recovery-gradient" cx="50%" cy="0%" r="100%" >
                            <stop offset="0%"   stop-color="rgba(var(--recovered-rgb), 0.03)"  />
                            <stop offset="50%"   stop-color="rgba(var(--recovered-rgb), 0.1)"  />
                            <stop offset="90%"  stop-color="rgba(var(--recovered-rgb), 0.3)"  />
                            <stop offset="100%" stop-color="rgba(var(--recovered-rgb), 0.4)"  />
                        </radialGradient>

                        <radialGradient id="tmf-gradient" cx="50%" cy="50%" r="50%" >
                            <stop offset="0%"   stop-color="rgba(var(--recovered-rgb), 0.0)"  />
                            <stop offset="70%"  stop-color="rgba(var(--recovered-rgb), 0.4)"  />
                            <stop offset="100%" stop-color="rgba(var(--recovered-rgb), 0.5)"  />
                        </radialGradient>

                        <radialGradient id="disposal-gradient"  cx="50%" cy="35%" r="100%" >
                        <stop offset="0%"   stop-color="rgb(130, 130, 130)" />    
                        <stop offset="60%"   stop-color="var(--disposal)"  />
    
                        </radialGradient>

                        <pattern id="zigzag" width="10" height="10" patternUnits="userSpaceOnUse">
                            <path d="M0 10 L5 0 L15 20 L20 10"
                                fill="none"
                                stroke="var(--bg-pattern)"
                                stroke-width="1"
                            />
                        </pattern>

                        <!-- Fine horizontal lines — 4px spacing, light stroke -->
                        <pattern id="h-fine" width="10" height="4" patternUnits="userSpaceOnUse">
                            <line x1="0" y1="2" x2="10" y2="2" stroke="var(--bg-pattern)" stroke-width="0.75"/>
                        </pattern>

                        <!-- Medium horizontal lines — 8px spacing -->
                        <pattern id="h-medium" width="10" height="10" patternUnits="userSpaceOnUse">
                            <line x1="0" y1="5" x2="10" y2="5" stroke="var(--bg-pattern)" stroke-width="0.75"/>
                        </pattern>

                        <!-- Coarse horizontal lines — 16px spacing, heavier stroke -->
                        <pattern id="h-coarse" width="10" height="16" patternUnits="userSpaceOnUse">
                            <line x1="0" y1="8" x2="10" y2="8" stroke="var(--bg-pattern)" stroke-width="1.75"/>
                        </pattern>

                        <!-- Ladder — alternating thick/thin pair every 6px -->
                        <pattern id="h-ladder" width="10" height="6" patternUnits="userSpaceOnUse">
                            <line x1="0" y1="2" x2="10" y2="2" stroke="var(--bg-pattern)" stroke-width="1.5"/>
                            <line x1="0" y1="5" x2="10" y2="5" stroke="var(--bg-pattern)" stroke-width="0.5"/>
                        </pattern>

                        <!-- Diagonal 45° hatching — 8px tile -->
                        <pattern id="diag-45" width="8" height="8" patternUnits="userSpaceOnUse">
                            <line x1="-1" y1="9"  x2="9"  y2="-1" stroke="var(--bg-pattern)" stroke-width="1"/>
                            <line x1="-1" y1="17" x2="17" y2="-1" stroke="var(--bg-pattern)" stroke-width="1"/>
                        </pattern>

                        <!-- Crosshatch — horizontal + vertical, 8px grid -->
                        <pattern id="crosshatch" width="8" height="8" patternUnits="userSpaceOnUse">
                            <line x1="0" y1="4" x2="8" y2="4" stroke="var(--bg-pattern)" stroke-width="0.75"/>
                            <line x1="4" y1="0" x2="4" y2="8" stroke="var(--bg-pattern)" stroke-width="0.75"/>
                        </pattern>

                        <!-- Dots — 8px grid, r=1 -->
                        <pattern id="dots" width="8" height="8" patternUnits="userSpaceOnUse">
                            <circle cx="4" cy="4" r="1" fill="var(--bg-pattern)"/>
                        </pattern>

                        <!-- Sparse horizontal — 24px gap, 2px stroke, best for large shapes -->
                        <pattern id="h-sparse" width="10" height="24" patternUnits="userSpaceOnUse">
                            <line x1="0" y1="12" x2="10" y2="12" stroke="var(--bg-pattern)" stroke-width="2"/>
                        </pattern>
                    </defs>
                </svg>
            </div>

            <div id="tooltip"></div>
        </section>
    

        <footer class="sidebar__lower">
            <!-- <div class = 'footnote-block'>
                <p>Footnote details for:</p>
                <ul>
                    <li>key data assumptions and sources</li> 
                    <li>links to the data used</li>
                </ul>
            </div> -->
        </footer>
    
    </main>

    <script type="module" src = './js/main.js'></script>
</body>


</html>
